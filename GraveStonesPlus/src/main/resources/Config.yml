# Options:
# - FLATFILE
# - MYSQL
DataStorage: FLATFILE

# Used when DataStorage is MYSQL
Database:
  Host: "localhost"
  Port: 3306
  Database: "gravestones"
  Username: "root"
  Password: ""

  # Max number of connections in the pool
  MaxConnections: 5

  # Optional explicit table name override (leave empty to let the plugin choose)
  # Name: ""

  # Table name prefix
  Prefix: ""

  # Options:
  # - MYSQL
  # - MARIADB
  # - POSTGRESQL
  DbType: MYSQL

# What block/entity to use to represent graves in the world.
# Options:
# - PLAYER_HEAD     (uses the player's skull)
# - DISPLAY_ENTITY  (uses a display entity + barrier interaction block)
# - CHEST           (fake chest block only; items are still stored internally)
GraveDisplayType: PLAYER_HEAD

DebugLevel: NONE

# If true GraveStonesPlus.BreakOtherGraves will be given to all players by default
# Requires BreakOtherGravesWithPermission enabled to work
# Requires a restart
GiveBreakOtherGravesPermission: false

BreakOwnGraves:
  RequireBreakTime: false
  BreakTime: 20s
  HitTimeout: 5s
  SendMessage: true
  ActionBarMessage: true

# Control breaking other graves
BreakOtherGraves:
  # Allow breaking other graves
  Enabled: false
  # if enabled, you can break other graves with permission:
  # GraveStonesPlus.BreakOtherGraves
  RequirePermission: true
  # Break other graves (not owned by the player) after a certain amount of hitting the grave
  # Can be set in the format: 10s, 1m, 1h, etc.
  # If disabled graves can be broken immediately
  RequireBreakTime: false
  # Time before other graves become breakable for non-owners
  TimeOutBeforeBreakable: 2h
  BreakTime: 20s
  # Reset breaking progress after not hitting the grave for this amount of time
  HitTimeout: 5s
  SendMessage: true
  # Send breaking grave progess
  ActionBarMessage: true

# List of worlds with graves disabled
DisabledWorlds: []

# Enable a glowing effect near grave
GlowingEffectNearGrave: true

# Distance for glowing effect
GlowingEffectDistance: 30

# Time limit before grave is removed
# Supports durations such as:
# 10m, 1h, 12h, 1d, 7d
# Set to '' to disable
GraveTimeLimit: ''

# Amount of time broken graves are stored before they are removed
# This allows restoring graves that break before items can be obtained
# Supports durations such as:
# 10m, 1h, 12h, 1d, 7d
# Set to '' to disable
BrokenGraveTimeLimit: 7d

# Distance in which /gravestonesplus claimgrave will claim graves
GraveClaimDistance: 10

# Limit number of graves that can be created by a single person
GraveLimit: 10

# Drop items from grave if a grave gets removed due to GraveLimit above
DropItemsOnGraveRemoval: true

# If true, armor stands are disabled
# Use this if performance takes a hit with armor stands
DisableArmorStands: false

# If enabled it will give a compass on respawn pointing to last grave
GiveCompassOnRespawn: false

# Chance for items to drop
# This percentage is calculated on every item
PercentageDrops: 100

# Keeps items with lore set here on player death
# %player% works here
# Set to '' to disable
KeepItemsWithLore: ''

# Keep all player exp, default is minecraft drop rate
KeepAllExp: false

# If true, a grave will be created if a player has an empty inventory
# If false, no grave will be created
CreateGraveForEmptyInventories: false

# Whether or not to create daily backups. (Only the most recent ones get kept)
CreateBackups: false

Format:
  Death: '&aYour grave is at %x%, %y%, %z%'
  GraveBroke: '&aYou broke your grave!'
  GraveBrokeOther: '&aYou broke %player%'s grave!'
  GraveLimitBreak: '&cBreaking oldest grave due to limit reached'
  ItemsNotInCorrectSlot: "&aSome items didn't return to the correct slot"
  NotYourGrave: '&cNot your grave!'
  ClickMessage: "&a%player%'s grave. Died at %time%. Reason: %reason%"
  # Can't claim other graves based on TimeBeforeBreakable
  UnableToClaimDelay: "&cNot able to claim yet! %time% left before you can claim this grave!"
  NonEnoughPermission: "&cYou don't enough permissions!"
  StartedBreakingGrave: "&aStarted breaking grave! Keep hitting to break it!"
  StoppedBreakingGrave: "&aStopped breaking grave!"

  # Hologram message
  Grave:
    Top: '%player% died here!'
    Middle: 'Died at %time%'
    Bottom: 'Reason: %reason%'