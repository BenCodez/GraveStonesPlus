# =========================================================
# Storage Settings
# =========================================================

# Storage type used for grave data.
# Options:
# - FLATFILE
# - MYSQL
DataStorage: FLATFILE

# Database settings used when DataStorage is MYSQL
Database:
  Host: "localhost"
  Port: 3306
  Database: "gravestones"
  Username: "root"
  Password: ""

  # Maximum number of database connections kept in the pool
  MaxConnections: 5

  # Optional explicit table name override
  # Leave empty to let the plugin choose the table name
  # Name: ""

  # Prefix added to database table names
  Prefix: ""

  # Database type to use
  # Options:
  # - MYSQL
  # - MARIADB
  # - POSTGRESQL
  DbType: MYSQL


# =========================================================
# General Settings
# =========================================================

# Debug logging level
DebugLevel: NONE

# Gives GraveStonesPlus.BreakOtherGraves to all players by default
# Requires Breaking.Other.RequirePermission to be enabled
# Requires a restart to fully apply
GiveBreakOtherGravesPermission: false

# Worlds where graves should not be created
DisabledWorlds: []

# Create a grave even if the player had no items
CreateGraveForEmptyInventories: false

# Create daily backup files (only most recent are kept)
CreateBackups: false


# =========================================================
# Grave Display Settings
# =========================================================

# Controls how graves are shown in the world
# Options:
# - PLAYER_HEAD     Uses the player's skull
# - DISPLAY_ENTITY  Uses a display entity with a barrier interaction block
# - CHEST           Uses a fake chest block (items are still stored internally)
GraveDisplayType: PLAYER_HEAD

# Disable armor stands used by the plugin
# Useful if armor stands cause performance issues
DisableArmorStands: false

GlowingEffect:
  # Show a glow-style marker near graves
  Enabled: true

  # Maximum distance in blocks for the glowing effect
  Distance: 30


# =========================================================
# Breaking Settings
# =========================================================

Breaking:
  Default:
    # Require repeated hits instead of instant break/claim
    RequireBreakTime: false

    # Total time required to break a grave
    BreakTime: 10s

    # Time allowed between hits before progress resets
    HitTimeout: 5s

    # Send chat messages while breaking
    SendMessage: true

    # Send action bar progress/messages while breaking
    ActionBarMessage: true

  Own:
    # Optional overrides for breaking your own grave
    # Any setting not defined here will use Breaking.Default

  Other:
    # Allow players to break other players' graves
    Enabled: false

    # Require the GraveStonesPlus.BreakOtherGraves permission
    RequirePermission: true

    # Time that must pass before another player's grave can be broken
    TimeOutBeforeBreakable: 2h

    # Optional overrides for breaking other players' graves
    # Any setting not defined here will use Breaking.Default


# =========================================================
# Claiming Settings
# =========================================================

# Maximum distance in blocks used by /gravestonesplus claimgrave
GraveClaimDistance: 10

# Give a compass on respawn pointing to the last grave
GiveCompassOnRespawn: false


# =========================================================
# Grave Limits & Cleanup
# =========================================================

# Maximum number of graves a player can have at one time
GraveLimit: 10

# Drop items from the removed grave when the limit is exceeded
DropItemsOnGraveRemoval: true

# Time before a grave is automatically removed
# Supports: 10m, 1h, 12h, 1d, 7d
# Set to '' to disable
GraveTimeLimit: ''

# Time broken graves are kept before being removed
# Allows restoring graves if broken early
# Supports: 10m, 1h, 12h, 1d, 7d
# Set to '' to disable
BrokenGraveTimeLimit: 7d


# =========================================================
# Drops & Experience
# =========================================================

# Chance for each item to be dropped (applies per item)
PercentageDrops: 100

# Keep all player experience instead of vanilla drop behavior
KeepAllExp: false

# Keep items that contain matching lore when the player dies
# %player% can be used here
# Set to '' to disable
KeepItemsWithLore: ''


# =========================================================
# Messages / Format
# =========================================================

Format:
  Death: '&aYour grave is at %x%, %y%, %z%'
  GraveBroke: '&aYou broke your grave!'
  GraveBrokeOther: '&aYou broke %player%''s grave!'
  GraveLimitBreak: '&cBreaking oldest grave due to limit reached'
  ItemsNotInCorrectSlot: "&aSome items didn't return to the correct slot"
  NotYourGrave: '&cNot your grave!'
  ClickMessage: "&a%player%''s grave. Died at %time%. Reason: %reason%"
  UnableToClaimDelay: "&cNot able to claim yet! %time% left before you can claim this grave!"
  NotEnoughPermission: "&cYou don't have permission to do that!"
  StartedBreakingGrave: "&aStarted breaking grave! Keep hitting to break it!"
  StoppedBreakingGrave: "&aStopped breaking grave!"

  Grave:
    Top: '%player% died here!'
    Middle: 'Died at %time%'
    Bottom: 'Reason: %reason%'